<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>M3U Player with Categories & Languages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      color-scheme: light dark;

      --bg: #111;
      --panel: #1b1b1b;
      --text: #eaeaea;
      --muted: #9aa0a6;
      --accent: #4f8cff;
      --border: #2a2a2a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        Helvetica,
        Arial;

      background: var(--bg);
      color: var(--text);

      display: grid;
      grid-template-rows: auto 1fr;

      height: 100vh;
    }

    header.topbar {
      padding: 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);

      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="url"],
    input[type="text"] {
      flex: 1 1 250px;
      min-width: 180px;

      padding: 10px 12px;

      border-radius: 8px;
      border: 1px solid var(--border);

      background: #0f0f0f;
      color: var(--text);

      outline: none;
    }

    button {
      padding: 10px 14px;

      border-radius: 8px;
      border: 1px solid var(--border);

      background: #202124;
      color: var(--text);

      cursor: pointer;
    }

    button:hover {
      background: #2a2b2f;
    }

    .container {
      display: grid;

      grid-template-columns: 240px 240px 380px 1fr;

      gap: 10px;
      padding: 10px;

      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);

      border-radius: 10px;

      min-height: 0;

      display: flex;
      flex-direction: column;
    }

    .panel header {
      padding: 10px;
      font-weight: 600;
    }

    .row {
      display: flex;
      gap: 8px;

      padding: 8px;

      border-bottom: 1px solid var(--border);

      align-items: center;
    }

    .scroll {
      overflow: auto;

      padding: 8px;

      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .badge {
      background: #202b45;
      color: #cfe0ff;

      border: 1px solid #2c3f6b;

      padding: 2px 8px;

      border-radius: 999px;

      font-size: 12px;
    }

    .category,
    .channel {
      display: grid;
      align-items: center;

      gap: 10px;

      padding: 8px 10px;

      border-radius: 8px;

      background: #161616;

      cursor: pointer;

      border: 1px solid transparent;
    }

    .category {
      grid-template-columns: 1fr auto;
    }

    .channel {
      grid-template-columns: 40px 1fr auto;
    }

    .category:hover,
    .channel:hover {
      background: #1c1c1c;
      border-color: var(--border);
    }

    .category.active,
    .channel.active {
      border-color: var(--accent);
      background: #172033;
    }

    .logo {
      width: 40px;
      height: 40px;

      object-fit: cover;

      border-radius: 6px;

      border: 1px solid var(--border);

      background: #000;
    }

    .muted {
      color: var(--muted);
      font-size: 0.9em;
    }

    .title {
      font-weight: 600;
    }

    .player-info {
      padding: 10px;

      border-bottom: 1px solid var(--border);

      display: flex;
      align-items: center;
      gap: 10px;
    }

    .controls {
      margin-left: auto;

      display: flex;
      gap: 8px;
    }

    video {
      width: 100%;
      height: 100%;

      background: black;
    }

    .hint {
      padding: 8px 12px;
      color: var(--muted);
      font-size: 0.92em;
    }

    @media (max-width: 1300px) {
      .container {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }

      .player {
        grid-column: 1 / -1;
        min-height: 400px;
      }
    }

    @media (max-width: 700px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <input
      id="m3uUrl"
      type="url"
      placeholder="Enter M3U/M3U8 playlist URL"
    />

    <button id="loadBtn">
      Load Playlist
    </button>

    <span class="muted">
      Supports Categories + Languages filters
    </span>
  </header>

  <div class="container">

    <!-- Categories -->
    <section class="panel">
      <header>Categories</header>

      <div class="row">
        <input
          id="catSearch"
          type="text"
          placeholder="Search categories..."
        />

        <span class="badge" id="catCount">0</span>
      </div>

      <div class="scroll" id="categoriesList"></div>
    </section>

    <!-- Languages -->
    <section class="panel">
      <header>Languages</header>

      <div class="row">
        <input
          id="langSearch"
          type="text"
          placeholder="Search languages..."
        />

        <span class="badge" id="langCount">0</span>
      </div>

      <div class="scroll" id="languagesList"></div>
    </section>

    <!-- Channels -->
    <section class="panel">
      <header>Channels</header>

      <div class="row">
        <input
          id="chanSearch"
          type="text"
          placeholder="Search channels..."
        />

        <span class="badge" id="chanCount">0</span>
      </div>

      <div class="scroll" id="channelsList"></div>
    </section>

    <!-- Player -->
    <section class="panel player">

      <div class="player-info">

        <img
          id="playerLogo"
          class="logo"
          alt=""
        />

        <div>
          <div class="title" id="playerTitle">
            No channel selected
          </div>

          <div class="muted" id="playerMeta"></div>
        </div>

        <div class="controls">
          <button id="playBtn">
            Play/Pause
          </button>

          <button id="muteBtn">
            Mute
          </button>
        </div>
      </div>

      <video
        id="video"
        controls
        playsinline
      ></video>

      <div class="hint">
        Parses: group-title, tvg-language, tvg-country, tvg-logo, tvg-name
      </div>

    </section>

  </div>

  <script>

    // INPUTS

    const m3uUrlInput = document.getElementById('m3uUrl');
    const loadBtn = document.getElementById('loadBtn');

    const catSearch = document.getElementById('catSearch');
    const langSearch = document.getElementById('langSearch');
    const chanSearch = document.getElementById('chanSearch');

    // LISTS

    const categoriesList = document.getElementById('categoriesList');
    const languagesList = document.getElementById('languagesList');
    const channelsList = document.getElementById('channelsList');

    // COUNTS

    const catCount = document.getElementById('catCount');
    const langCount = document.getElementById('langCount');
    const chanCount = document.getElementById('chanCount');

    // PLAYER

    const video = document.getElementById('video');

    const playerTitle = document.getElementById('playerTitle');
    const playerMeta = document.getElementById('playerMeta');
    const playerLogo = document.getElementById('playerLogo');

    const playBtn = document.getElementById('playBtn');
    const muteBtn = document.getElementById('muteBtn');

    // DATA

    let allChannels = [];

    let categories = [];
    let languages = [];

    let selectedCategory = 'All';
    let selectedLanguage = 'All';

    // HELPERS

    const norm = s => (s || '').toString().trim();
    const safe = s => norm(s).toLowerCase();

    // ATTRIBUTE PARSER

    function parseAttributes(attrStr) {

      const attrs = {};

      const rx =
        /(\w[\w-]*)=("([^"\\]|\\.)*"|[^,]*)/g;

      let m;

      while ((m = rx.exec(attrStr)) !== null) {

        const key = m[1];

        let val = m[2];

        if (
          val.startsWith('"') &&
          val.endsWith('"')
        ) {
          val = val.slice(1, -1);
        }

        attrs[key] = String(val);
      }

      return attrs;
    }

    // M3U PARSER

    function parseM3U(text) {

      const lines = text.split(/\r?\n/);

      const result = [];

      let current = null;

      for (let i = 0; i < lines.length; i++) {

        const line = lines[i].trim();

        if (!line) continue;

        if (line.startsWith('#EXTINF')) {

          const commaIdx = line.indexOf(',');

          const header =
            commaIdx >= 0
              ? line.slice(0, commaIdx)
              : line;

          const title =
            commaIdx >= 0
              ? norm(line.slice(commaIdx + 1))
              : '';

          const attrStr =
            header.replace(
              /^#EXTINF:([^ ]*)\s*/,
              ''
            );

          const attrs = parseAttributes(attrStr);

          current = {

            name:
              title ||
              attrs['tvg-name'] ||
              '',

            tvgName:
              attrs['tvg-name'] || '',

            tvgId:
              attrs['tvg-id'] || '',

            logo:
              attrs['tvg-logo'] || '',

            group:
              attrs['group-title'] ||
              attrs['tvg-group'] ||
              'Uncategorized',

            language:
              attrs['tvg-language'] ||
              attrs['language'] ||
              'Unknown',

            country:
              attrs['tvg-country'] ||
              attrs['country'] ||
              'Unknown',

            url: ''
          };

        } else if (
          current &&
          !line.startsWith('#')
        ) {

          current.url = line;

          result.push(current);

          current = null;
        }
      }

      return result.filter(c => c.url);
    }

    // BUILD FILTERS

    function buildCategories(channels) {

      const set = new Set(['All']);

      for (const ch of channels) {
        set.add(
          norm(ch.group) || 'Uncategorized'
        );
      }

      return Array.from(set).sort();
    }

    function buildLanguages(channels) {

      const set = new Set(['All']);

      for (const ch of channels) {
        set.add(
          norm(ch.language) || 'Unknown'
        );
      }

      return Array.from(set).sort();
    }

    // RENDER CATEGORIES

    function renderCategories() {

      const q = safe(catSearch.value);

      categoriesList.innerHTML = '';

      const filtered =
        categories.filter(c =>
          safe(c).includes(q)
        );

      filtered.forEach(cat => {

        const count =
          cat === 'All'
            ? allChannels.length
            : allChannels.filter(
                ch =>
                  norm(ch.group) === cat
              ).length;

        const el =
          document.createElement('div');

        el.className =
          'category' +
          (
            cat === selectedCategory
              ? ' active'
              : ''
          );

        el.innerHTML = `
          <div>${cat}</div>
          <div class="badge">${count}</div>
        `;

        el.addEventListener('click', () => {

          selectedCategory = cat;

          renderCategories();
          renderChannels();
        });

        categoriesList.appendChild(el);
      });

      catCount.textContent = filtered.length;
    }

    // RENDER LANGUAGES

    function renderLanguages() {

      const q = safe(langSearch.value);

      languagesList.innerHTML = '';

      const filtered =
        languages.filter(l =>
          safe(l).includes(q)
        );

      filtered.forEach(lang => {

        const count =
          lang === 'All'
            ? allChannels.length
            : allChannels.filter(
                ch =>
                  norm(ch.language) === lang
              ).length;

        const el =
          document.createElement('div');

        el.className =
          'category' +
          (
            lang === selectedLanguage
              ? ' active'
              : ''
          );

        el.innerHTML = `
          <div>${lang}</div>
          <div class="badge">${count}</div>
        `;

        el.addEventListener('click', () => {

          selectedLanguage = lang;

          renderLanguages();
          renderChannels();
        });

        languagesList.appendChild(el);
      });

      langCount.textContent = filtered.length;
    }

    // RENDER CHANNELS

    function renderChannels() {

      const q = safe(chanSearch.value);

      channelsList.innerHTML = '';

      let list = allChannels;

      // CATEGORY FILTER

      if (selectedCategory !== 'All') {

        list = list.filter(
          ch =>
            norm(ch.group) ===
            selectedCategory
        );
      }

      // LANGUAGE FILTER

      if (selectedLanguage !== 'All') {

        list = list.filter(
          ch =>
            norm(ch.language) ===
            selectedLanguage
        );
      }

      // SEARCH

      if (q) {

        list = list.filter(ch =>

          safe(ch.name).includes(q) ||

          safe(ch.tvgName).includes(q) ||

          safe(ch.group).includes(q) ||

          safe(ch.language).includes(q)
        );
      }

      list.forEach(ch => {

        const el =
          document.createElement('div');

        el.className = 'channel';

        const logo = norm(ch.logo);

        el.innerHTML = `

          <img
            class="logo"
            src="${logo}"
            alt=""
            onerror="this.style.visibility='hidden'"
          />

          <div>
            <div>
              ${norm(ch.name) || 'Untitled'}
            </div>

            <div class="muted">
              ${norm(ch.group)}
              •
              ${norm(ch.language)}
            </div>
          </div>

          <button>Play</button>
        `;

        el.addEventListener('click', () => {
          playChannel(ch);
        });

        channelsList.appendChild(el);
      });

      chanCount.textContent = list.length;
    }

    // FETCH PLAYLIST

    async function fetchText(url) {

      const res = await fetch(url);

      if (!res.ok) {
        throw new Error(
          `HTTP ${res.status}`
        );
      }

      return res.text();
    }

    async function loadPlaylist(url) {

      try {

        categoriesList.innerHTML =
          '<div class="muted">Loading...</div>';

        languagesList.innerHTML = '';
        channelsList.innerHTML = '';

        const text =
          await fetchText(url);

        allChannels =
          parseM3U(text);

        categories =
          buildCategories(allChannels);

        languages =
          buildLanguages(allChannels);

        selectedCategory = 'All';
        selectedLanguage = 'All';

        renderCategories();
        renderLanguages();
        renderChannels();

        if (allChannels.length) {
          playChannel(allChannels[0]);
        }

      } catch (err) {

        console.error(err);

        alert(
          'Failed to load playlist.\nPossible CORS issue or invalid URL.'
        );
      }
    }

    // PLAY CHANNEL

    function playChannel(ch) {

      playerTitle.textContent =
        norm(ch.name) ||
        'Untitled Channel';

      playerMeta.textContent =
        `${norm(ch.group)} • ${norm(ch.language)}`;

      playerLogo.src =
        norm(ch.logo) || '';

      playerLogo.style.visibility =
        ch.logo ? 'visible' : 'hidden';

      const wasMuted = video.muted;

      video.src = ch.url;

      video.muted = wasMuted;

      video.play().catch(err => {

        console.warn(
          'Playback issue:',
          err
        );
      });
    }

    // EVENTS

    loadBtn.addEventListener('click', () => {

      const url =
        m3uUrlInput.value.trim();

      if (!url) {
        alert('Enter playlist URL');
        return;
      }

      loadPlaylist(url);
    });

    m3uUrlInput.addEventListener(
      'keydown',
      e => {

        if (e.key === 'Enter') {
          loadBtn.click();
        }
      }
    );

    catSearch.addEventListener(
      'input',
      renderCategories
    );

    langSearch.addEventListener(
      'input',
      renderLanguages
    );

    chanSearch.addEventListener(
      'input',
      renderChannels
    );

    playBtn.addEventListener(
      'click',
      () => {

        if (video.paused) {
          video.play();
        } else {
          video.pause();
        }
      }
    );

    muteBtn.addEventListener(
      'click',
      () => {

        video.muted = !video.muted;

        muteBtn.textContent =
          video.muted
            ? 'Unmute'
            : 'Mute';
      }
    );

    // INITIAL

    playerLogo.style.visibility = 'hidden';

  </script>

</body>
</html>
